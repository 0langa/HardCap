name: Bug report
description: Report a reproducible problem in HardCap.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve HardCap. Please include enough detail to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: HardCap version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2 x64"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Start HardCap...\n2. Select...\n3. Save & apply..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Include target application, configured limits, and status text shown in HardCap.
